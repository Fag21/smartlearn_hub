{% extends 'base.html' %}

{% block content %}
<div class="min-h-screen bg-gray-50 py-8">
    <div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="bg-white shadow rounded-lg">
            <div class="px-6 py-4 border-b border-gray-200">
                <h1 class="text-2xl font-bold text-gray-900">Delete Note</h1>
            </div>
            
            <div class="p-6">
                <p class="text-gray-700 mb-6">Are you sure you want to delete the note <strong>"{{ note.title }}"</strong>? This action cannot be undone.</p>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="flex justify-end space-x-3">
                        <a href="{% url 'notes:note_detail' note.pk %}" 
                           class="bg-white text-gray-700 px-6 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 transition duration-200">
                            Cancel
                        </a>
                        <button type="submit" class="bg-red-600 text-white px-6 py-2 rounded-lg hover:bg-red-700 transition duration-200">
                            Delete Note
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
