[pytest]
DJANGO_SETTINGS_MODULE = core.settings.testing
python_files = tests.py test_*.py *_tests.py
python_classes = *Test
python_functions = test_*
addopts = 
    --verbose
    --strict-markers
    --tb=short
    --disable-warnings
    -x
testpaths = apps
markers =
    unit: Unit tests
    integration: Integration tests
    websocket: WebSocket tests
    celery: Celery task tests
    slow: Slow tests

[coverage:run]
source = apps
omit = 
    */migrations/*
    */tests/*
    */test_*
    *test*.py
    */admin.py
    */apps.py
    */asgi.py
    */wsgi.py
    */manage.py
    */health.py
    */settings/*
    */urls.py
    */__init__.py
    */celery.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:

[coverage:html]
directory = htmlcov